      </nav>
      <div class="nav-actions">
        <span class="phone">هاتف: +(970)0594866148</span>
        <a href="login.html" class="btn-login nav-active-login">تسجيل الدخول</a>
        <a href="pricing.html" class="btn-cta">ابدأ الآن</a>

      <button class="mobile-menu-btn" id="mobileMenuBtn" aria-label="القائمة">

    </div>
  </header>

  <main>
    <section class="login-section">
      <div class="login-card">
        <a href="index.html" class="logo login-logo">لازورد</a>
        <h1>تسجيل الدخول</h1>
        <p class="login-sub">أدخل بياناتك للوصول إلى حسابك</p>

        <form class="login-form" id="loginForm">
          <div class="form-group">
            <label for="loginEmail">البريد الإلكتروني</label>
            <input type="email" id="loginEmail" placeholder="mufid@gamil.com" />
          </div>
          <div class="form-group">
            <label for="loginPassword">كلمة المرور</label>
            <input type="password" id="loginPassword" placeholder="••••••••" />
          </div>
          <div class="login-remember">
            <label class="checkbox-label">
              <input type="checkbox" id="remember" />
              <span>تذكرني</span>
            </label>
            <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
          </div>
          <button type="submit" class="btn-submit login-submit">تسجيل الدخول</button>
        </form>

        <p class="login-register">ليس لديك حساب؟ <a href="pricing.html" class="link-green">سجّل الآن مجاناً</a></p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
